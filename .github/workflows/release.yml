name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build a release for (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  # Build portable binaries. These use the pdf.js fallback (NO_PDF) rather
  # than mupdf, so a downloaded binary is self-contained — its only dynamic
  # dependency is the system web view. Homebrew users still get the native
  # mupdf path via the formula.
  build:
    strategy:
      matrix:
        include:
          # One universal macOS binary (arm64 + x86_64) built on the fast
          # Apple-silicon runner, avoiding the slow Intel runner queue.
          - os: macos-latest
            asset: macos-universal
            cc: cc -arch arm64 -arch x86_64
            cxx: c++ -arch arm64 -arch x86_64
          - os: ubuntu-latest
            asset: linux-x64
            cc: cc
            cxx: c++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build (portable, pdf.js fallback)
        run: make NO_PDF=1 CC="${{ matrix.cc }}" CXX="${{ matrix.cxx }}"

      - name: Smoke test
        run: |
          ./preview --version
          make NO_PDF=1 test

      - name: Package
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIR="preview-${TAG}-${{ matrix.asset }}"
          mkdir "$DIR"
          cp preview README.md LICENSE CHANGELOG.md "$DIR"/
          mkdir -p "$DIR/man"
          cp man/preview.1 "$DIR/man/"
          tar czf "$DIR.tar.gz" "$DIR"
          shasum -a 256 "$DIR.tar.gz" > "$DIR.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            preview-*.tar.gz
            preview-*.tar.gz.sha256

  # Windows build (MSYS2/MinGW + WebView2, pdf.js for PDF).
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc make python zip
      - name: Fetch WebView2 SDK headers
        run: |
          curl -sL -o wv2.nupkg \
            https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2792.45
          python -c "import zipfile; zipfile.ZipFile('wv2.nupkg').extractall('wv2')"
      - name: Build
        run: make WEBVIEW2_INCLUDE="$(pwd)/wv2/build/native/include"
      - name: Package
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIR="preview-${TAG}-windows-x64"
          mkdir "$DIR"
          cp preview.exe README.md LICENSE CHANGELOG.md "$DIR"/
          zip -r "$DIR.zip" "$DIR"
          sha256sum "$DIR.zip" > "$DIR.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            preview-*.zip
            preview-*.zip.sha256

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          awk -v v="$VER" '
            /^## \[/ { if (p) exit }
            index($0, "[" v "]") { p = 1 }
            p { print }
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release $TAG" > notes.md

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" dist/*.tar.gz dist/*.sha256 \
            --title "preview $TAG" \
            --notes-file notes.md \
            || gh release upload "$TAG" dist/*.tar.gz dist/*.sha256 --clobber
