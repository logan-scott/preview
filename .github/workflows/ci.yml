name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # macOS: full build including PDF (Homebrew mupdf links cleanly).
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mupdf
        run: brew install mupdf
      - name: Build
        run: make
      - name: Test
        run: make test

  # Linux: WebKitGTK backend. Built without mupdf — Ubuntu's libmupdf is a
  # static archive with no pkg-config file and a long chain of transitive
  # deps, so the Makefile falls back to NO_PDF here. The suite skips PDF
  # render assertions when PDF isn't built; macOS covers the PDF path.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WebKitGTK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build
        run: make
      - name: Test
        run: make test

  # AddressSanitizer + UndefinedBehaviorSanitizer over the whole corpus,
  # including the crafted hostile inputs. Sanitizers are injected through
  # CC/CXX so the Makefile's link flags are preserved; NO_PDF keeps mupdf
  # (uninstrumented third-party code) out of the picture.
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WebKitGTK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build and test with sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          make test NO_PDF=1 \
            CC="cc -fsanitize=address,undefined -fno-omit-frame-pointer" \
            CXX="c++ -fsanitize=address,undefined -fno-omit-frame-pointer"

  # Windows via MSYS2/MinGW and WebView2 (PDF through the pdf.js fallback).
  # Marked experimental while the WebView2 build path is stabilized, so a
  # failure here does not fail the overall run.
  windows:
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
            python
      - name: Fetch WebView2 SDK headers
        run: |
          curl -sL -o wv2.nupkg \
            https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2792.45
          python -c "import zipfile; zipfile.ZipFile('wv2.nupkg').extractall('wv2')"
          test -f wv2/build/native/include/WebView2.h && echo "WebView2.h present"
      - name: Build
        run: make WEBVIEW2_INCLUDE="$(pwd)/wv2/build/native/include"
      - name: Test
        run: make test WEBVIEW2_INCLUDE="$(pwd)/wv2/build/native/include"
